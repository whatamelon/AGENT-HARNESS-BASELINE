# admin-security/_rbac-matrix.yaml — RBAC fixture × route × action SSOT
# admin-design/machine/rbac-matrix.yaml 와 동기 (본 파일이 정본).
version: 1.0.0

roles:
  - owner
  - admin
  - manager
  - operator
  - analyst
  - viewer
  - forbidden

fixtures:
  # admin-build CLI 가 자동 주입하는 fixture 4종 (운영 minimum)
  owner:
    description: "최상위 권한"
    expected_allow_routes: all
    expected_allow_actions: all
  ops:
    description: "operator 운영팀 — read + 일부 update"
    expected_allow_actions: [read, update]
    expected_deny_actions: [delete, refund, settings.manage]
  viewer:
    description: "read-only"
    expected_allow_actions: [read]
    expected_deny_actions: [create, update, delete, refund]
  forbidden:
    description: "음성 fixture — 모든 protected route 에 ForbiddenState"
    expected_allow_routes: [/login]
    expected_deny_routes: all_except_login

permission_format: "{domain}.{action}"

route_action_matrix:
  list_page:
    required_permission: "{domain}.read"
    fixtures_allow: [owner, manager, operator, analyst, viewer]
    fixtures_deny: [forbidden]
  detail_page:
    required_permission: "{domain}.read"
    fixtures_allow: [owner, manager, operator, analyst, viewer]
    fixtures_deny: [forbidden]
  create:
    required_permission: "{domain}.create"
    fixtures_allow: [owner, admin, manager]
    fixtures_deny: [operator, analyst, viewer, forbidden]
  update:
    required_permission: "{domain}.update"
    fixtures_allow: [owner, admin, manager, operator]
    fixtures_deny: [analyst, viewer, forbidden]
  delete:
    required_permission: "{domain}.delete"
    fixtures_allow: [owner, admin]
    fixtures_deny: [manager, operator, analyst, viewer, forbidden]
  refund:
    required_permission: "{domain}.refund"
    fixtures_allow: [owner, admin]
    fixtures_deny: [manager, operator, analyst, viewer, forbidden]
  settings_manage:
    required_permission: "settings.manage"
    fixtures_allow: [owner, admin]
    fixtures_deny: [manager, operator, analyst, viewer, forbidden]

enforcement_layers:
  required: ["ui_layer", "server_layer"]
  ui_layer:
    options: [PermissionGate, useCan, RouteMeta.requiredPermission]
    note: "UX hide/disable only — never relied on as security boundary"
  server_layer:
    options:
      - api_route_handler
      - server_action
      - edge_function
      - database_rls_policy
      - stored_procedure
    required_count: ">=1 per protected action"

verifier_runtime_contract:
  fixture_count_minimum: 4    # owner + ops + viewer + forbidden
  must_verify:
    - route_redirect_on_forbidden
    - button_visibility_on_disabled
    - server_403_when_ui_bypassed     # 클라이언트 검증 우회 시 서버가 403 반환
    - rls_deny_on_cross_org_select
