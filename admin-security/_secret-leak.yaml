# admin-security/_secret-leak.yaml — service_role / secret browser bundle 누출 탐지
# L1 grep verifier 가 사용. 단 하나라도 매치 발견 → fatal.
version: 1.0.0

patterns:
  - id: supabase-service-role
    pattern: "SUPABASE_SERVICE_ROLE_KEY|service_role|SERVICE_ROLE"
    severity: fatal
  - id: stripe-secret
    pattern: "STRIPE_SECRET_KEY|sk_live_|sk_test_[a-zA-Z0-9]{20,}"
    severity: fatal
  - id: openai-key
    pattern: "OPENAI_API_KEY|sk-[a-zA-Z0-9]{20,}"
    severity: fatal
  - id: jwt-secret
    pattern: "JWT_SECRET|JWT_SIGNING_KEY"
    severity: fatal
  - id: db-url-raw
    pattern: "postgres(ql)?://[^:]+:[^@]+@"
    severity: fatal
  - id: aws-access-key
    pattern: "AKIA[0-9A-Z]{16}"
    severity: fatal
  - id: gcp-service-account
    pattern: "\"type\":\\s*\"service_account\""
    severity: fatal
  - id: anthropic-key
    pattern: "ANTHROPIC_API_KEY|sk-ant-[a-zA-Z0-9_-]{20,}"
    severity: fatal
  - id: github-pat
    pattern: "ghp_[a-zA-Z0-9]{36}|github_pat_[a-zA-Z0-9_]{82}"
    severity: fatal

forbid_paths:
  # client-bundled paths — secret 절대 노출 금지
  - "src/components/**"
  - "src/features/**/components/**"
  - "src/hooks/**"
  - "app/**/page.tsx"
  - "app/**/page.ts"
  - "app/**/layout.tsx"
  - "app/**/layout.ts"
  - "app/(public)/**/*.tsx"
  - "app/(admin)/**/*.tsx"
  - "public/**"
  - "static/**"
  - "components.json"
  - ".next/static/**"        # build output sanity check
  - "dist/**"
  - "build/**"

allow_paths:
  # server-only — env 참조 OK (단 export 금지)
  - "src/server/**"
  - "src/lib/server/**"
  - "src/lib/supabase/server.ts"
  - "src/lib/auth/server.ts"
  - "app/api/**/route.ts"
  - "app/api/**/route.ts.bak"
  - "src/services/**/*.server.ts"
  - "supabase/functions/**"
  - ".env*"
  - "scripts/**"
  - "tests/**"
  - "*.test.ts"
  - "*.spec.ts"

env_export_rules:
  forbidden_in_client:
    - "process.env.SUPABASE_SERVICE_ROLE_KEY"
    - "process.env.STRIPE_SECRET_KEY"
    - "process.env.OPENAI_API_KEY"
    - "process.env.ANTHROPIC_API_KEY"
    - "process.env.JWT_SECRET"
    - "process.env.DATABASE_URL"
  allowed_in_client:
    - "process.env.NEXT_PUBLIC_*"
    - "import.meta.env.VITE_PUBLIC_*"
    - "process.env.NEXT_PUBLIC_SUPABASE_URL"
    - "process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY"

build_output_scan:
  enabled: true
  scan_dirs: [".next/static", "dist", "build"]
  pattern_check: "service_role|sk_live_|sk-ant-"
  fail_on_match: true
