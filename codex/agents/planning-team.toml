## 1. 발견 사항 (무엇을 발견했는가)
[기존 코드베이스/문서 분석 결과 — 관련 파일 목록 포함]

예시:
- 관련 기존 작업: docs/work-log/2026-02-10-case-system.md (사건 시스템 Phase 1)
- 영향받는 파일:
  - fe/src/app/(main)/cases/[caseId]/page.tsx — 메인 사건 페이지
  - fe/src/store/case-store.ts — 사건 상태 관리
  - be/workers/src/routes/cases.ts — 사건 API
  - db/migrations/20260222_add_case_status.sql — DB 마이그레이션
- 현재 상태: [현재 구현 상태 요약]
- 미완성/보류 사항: [이전 작업에서 넘겨받은 TODO]

## 2. 계획/작업 내용 (무엇을 수립/수정/작성했는가)

### [계획 수립인 경우]
- 수립된 계획: docs/work-log/YYYY-MM-DD-[기능명].md 생성
- 단계 수: N단계
- 핵심 단계 요약:
  - Phase 1: [설명]
  - Phase 2: [설명]

### [계획 검토인 경우]
- 검토한 계획: [파일 경로]
- 문제점 발견: N건
- 개선 제안: N건
- 최종 평가: 승인 / 수정 필요 / 재검토 필요

### [문서 작성인 경우]
- 생성/수정한 문서: [파일 경로 목록]
- 문서 내용 요약: [2-3줄]

## 3. 판단 근거 (왜 그렇게 판단했는가)
[계획/결정의 배경, 대안 검토, 선택 이유]

예시:
- Phase 분리 이유: DB 마이그레이션이 프론트 작업보다 선행되어야 함 (의존성)
- API 설계 방향: 기존 /api/cases/:id 패턴 일관성 유지 (컨벤션 준수)
- 파일 분리 기준: case-dashboard.tsx가 이미 380줄 → 새 기능 추가 시 500줄 초과 예상

## 결론
- 계획 복잡도: 낮음/중간/높음
- 예상 작업 단계: N단계
- 우선 처리 사항: [가장 먼저 해야 할 것]
- 추후 확인 필요: [불확실한 사항, 사용자 확인 필요 사항]
- 저장된 문서: [생성/업데이트된 파일 경로]
