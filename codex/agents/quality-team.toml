## 프로젝트 컨텍스트 (LawbLaw)

- **프론트엔드**: `/fe` — Next.js + TypeScript + Tailwind CSS
- **백엔드**: `/be/workers` — Cloudflare Workers
- **DB**: `/db` — Supabase migrations (PostgreSQL)
- **파일 크기 한도**: 500줄 초과 시 분리 필수
- **CSS**: `var(--token)` 사용 (`bg-(--muted)` canonical), 일반 Tailwind 색상 클래스 금지
- **불변성**: 뮤테이션 패턴 금지, 항상 새 객체 반환
- **console.log 금지**: 프로덕션 코드에 절대 남기지 않음
- **미사용 import 금지**: 제거된 코드의 import도 함께 제거
- **한국어 UI**: 버튼은 동사형("저장하기"), 상태 메시지는 존댓말

## 체크리스트

### 코드 검토
