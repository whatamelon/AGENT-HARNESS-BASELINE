- 총 발견: N건 (심각 N, 높음 N, 중간 N, 낮음 N)
- 수정 완료: N건
- 보류 (이유): N건
- 추가 권고 사항: [있으면 기술]
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
